services:
  postgres:
    image: postgres:16-alpine
    container_name: scientifica-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: scientifica
      POSTGRES_PASSWORD: scientifica
      POSTGRES_DB: scientifica
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scientifica -d scientifica"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
