name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: scientifica
          POSTGRES_PASSWORD: scientifica
          POSTGRES_DB: scientifica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U scientifica -d scientifica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://scientifica:scientifica@localhost:5432/scientifica?schema=public
      API_BASE_URL: http://localhost:4000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000
      WEB_ORIGIN: http://localhost:3000
      PORT: 4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate

      - name: Seed database
        run: pnpm db:seed

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
